<svg viewBox="0 0 280 52" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Clark Spine and Pain Relief">
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="52" rx="2" fill="url(#barGrad)"/>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a7abf"/>
      <stop offset="100%" stop-color="#0a2342"/>
    </linearGradient>
  </defs>

  <!-- "Clark" — navy -->
  <text x="16" y="34"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34" font-weight="700" fill="#0a2342" letter-spacing="-0.5">Clark</text>

  <!-- "Spine" — accent blue -->
  <text x="105" y="34"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="34" font-weight="700" fill="#1a7abf" letter-spacing="-0.5"> Spine</text>

  <!-- Subtitle -->
  <text x="17" y="49"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="10" font-weight="400" fill="#5a6a7e" letter-spacing="2.5">AND PAIN RELIEF</text>
</svg>
